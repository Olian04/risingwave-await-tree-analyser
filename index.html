<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RisingWave await-tree report</title>
<style>
:root{--bg:#0f1115;--panel:#181b22;--panel2:#1f232c;--bd:#2b303b;--tx:#e6e8ec;
--mut:#9aa3af;--accent:#6ea8fe;--amber:#e0a13c;--red:#e05a5a;--blue:#5aa0e0;
--teal:#3fb8a0;--purple:#9b8cf0;--gray:#6b7280;--green:#57b368;}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--tx);
font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
.wrap{max-width:1080px;margin:0 auto;padding:24px 22px 90px;}
h1{font-size:22px;font-weight:600;margin:0 0 4px;}
h2{font-size:16px;font-weight:600;margin:34px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.sub{color:var(--mut);font-size:13px;margin:0 0 18px;}
a{color:var(--accent);text-decoration:none;}

/* ---- loader ---- */
#loader{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.drop{width:min(720px,92vw);border:1.5px dashed var(--bd);border-radius:16px;background:var(--panel);
padding:48px 32px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.drop.hot{border-color:var(--accent);background:#1b2230;}
.drop .big{font-size:19px;font-weight:600;margin-bottom:8px;}
.drop .hint{color:var(--mut);font-size:13.5px;line-height:1.7;}
.drop kbd{background:var(--panel2);border:1px solid var(--bd);border-radius:5px;padding:1px 6px;font-size:12px;font-family:ui-monospace,monospace;}
.drop .icon{font-size:40px;opacity:.5;margin-bottom:14px;}
.err{color:var(--red);margin-top:14px;font-size:13px;}

/* ---- report ---- */
#report{display:none;}
.bar{position:sticky;top:0;z-index:5;background:rgba(15,17,21,.92);backdrop-filter:blur(6px);
border-bottom:1px solid var(--bd);}
.bar .inner{max-width:1080px;margin:0 auto;padding:12px 22px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.bar .fn{font-weight:600;}
.bar .muted{color:var(--mut);font-size:12.5px;}
.bar .spacer{flex:1;}
.bar label{color:var(--mut);font-size:12.5px;display:flex;align-items:center;gap:5px;}
.bar input[type=number]{width:64px;background:var(--panel);border:1px solid var(--bd);color:var(--tx);
border-radius:6px;padding:4px 6px;font:inherit;}
button{background:var(--panel);border:1px solid var(--bd);color:var(--tx);border-radius:8px;
padding:6px 12px;font:inherit;cursor:pointer;}
button:hover{background:var(--panel2);border-color:#3a4150;}
.banner{background:#211d16;border:1px solid rgba(224,161,60,.4);color:var(--amber);
border-radius:10px;padding:10px 14px;margin:14px 0;font-size:13px;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0;}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;}
.card .k{color:var(--mut);font-size:12px;}
.card .v{font-size:24px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--bd);
border-radius:10px;overflow:hidden;font-variant-numeric:tabular-nums;}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--bd);}
th{color:var(--mut);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;}
.barcell{position:relative;background:var(--panel2);border-radius:5px;height:18px;min-width:40px;}
.barcell>span{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:5px;opacity:.55;}
.barcell>em{position:relative;font-style:normal;padding:0 6px;line-height:18px;font-size:12px;}
code,.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;}
.badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11.5px;border:1px solid var(--bd);}
.b-amber{background:rgba(224,161,60,.16);border-color:rgba(224,161,60,.5);color:var(--amber);}
.b-red{background:rgba(224,90,90,.16);border-color:rgba(224,90,90,.5);color:var(--red);}
.b-blue{background:rgba(90,160,224,.16);border-color:rgba(90,160,224,.5);color:var(--blue);}
.b-teal{background:rgba(63,184,160,.16);border-color:rgba(63,184,160,.5);color:var(--teal);}
.b-purple{background:rgba(155,140,240,.16);border-color:rgba(155,140,240,.5);color:var(--purple);}
.b-gray{background:rgba(107,114,128,.16);border-color:rgba(107,114,128,.5);color:var(--mut);}
.chain{background:var(--panel);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin:10px 0;}
.chain .title{font-weight:600;margin-bottom:8px;}
.chain .title .meta{color:var(--mut);font-weight:400;font-size:12.5px;margin-left:6px;}
.hop{display:flex;align-items:center;gap:8px;padding:3px 0;}
.hop .arm{color:var(--mut);font-family:ui-monospace,monospace;white-space:pre;}
.hop .pn{font-family:ui-monospace,monospace;}
.hop .w{color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums;margin-left:auto;}
.note{color:var(--mut);font-size:12.5px;margin-top:8px;}
.pill{display:inline-block;padding:1px 7px;border-radius:6px;background:var(--panel2);color:var(--mut);font-size:12px;margin-right:4px;}
</style>
</head>
<body>

<div id="loader">
  <div class="drop" id="drop" tabindex="0" role="button" aria-label="Load an await-tree dump">
    <div class="icon">⬇</div>
    <div class="big">Drop a RisingWave await-tree dump here</div>
    <div class="hint">
      or <strong>paste</strong> it with <kbd>⌘/Ctrl</kbd>+<kbd>V</kbd> (a file or the raw text),
      or <strong>click</strong> to choose a file.<br>
      Everything runs locally in your browser — nothing is uploaded.
    </div>
    <div class="err" id="err"></div>
  </div>
  <input type="file" id="file" hidden>
</div>

<div id="report">
  <div class="bar">
    <div class="inner">
      <span class="fn" id="fn"></span>
      <span class="muted" id="summary"></span>
      <span class="spacer"></span>
      <label>Top <input type="number" id="topN" value="15" min="1" max="200"></label>
      <label>Stuck ≥ <input type="number" id="stuck" value="2" min="0" step="0.5">s</label>
      <button id="dljson">Download JSON</button>
      <button id="another">Load another</button>
    </div>
  </div>
  <div class="wrap" id="body"></div>
</div>

<script>
"use strict";
// ===================================================================== //
// Parsing (ported 1:1 from await_tree_report.py)                         //
// ===================================================================== //
const DURATION_RE   = /\[([0-9.]+)(ns|us|µs|ms|s|m)\]\s*$/;
const ACTOR_HEADER  = /^Actor (\d+): `([^`]*)`/;
const ACTOR_PROBE   = /Actor \d+: `/;
const JVM_THREAD    = /^"([^"]+)" .*Id=(\d+)\s+([A-Z_]+)/;
const INPUT_EDGE    = /(?:Remote|Local)Input \(actor (\d+)\)/;
const SEC = {ns:1e-9, us:1e-6, "µs":1e-6, ms:1e-3, s:1, m:60};
const BUCKET_EDGES = [0,0.5,1,2,5,10,30,60,Infinity];
const CAT_COLOUR = {Source:"amber", wait_pending_fetch_block:"red", receive_barrier:"blue",
  "Wait For New Buffer Item":"teal", UpstreamSinkUnion:"purple", input:"gray", DynamicFilter:"gray", Now:"gray"};

function parseDuration(v,u){ return parseFloat(v)*SEC[u]; }

function normaliseLabel(label){
  label = label.replace(DURATION_RE,"").trim();
  label = label.replace(/\b[0-9A-F]{8,}\b/g,"");
  label = label.replace(/\(actor \d+\)/g,"(actor N)");
  label = label.replace(/\bactor \d+\b/g,"actor N");
  label = label.replace(/\d{6,}/g,"N");
  return label.replace(/\s+/g," ").trim();
}
function normaliseCategory(label){
  return (label.startsWith("RemoteInput")||label.startsWith("LocalInput")) ? "input" : label;
}
function arrMax(a){ let m=-Infinity; for(const v of a) if(v>m) m=v; return m===-Infinity?0:m; }
function leadingWs(line){ return line.length - line.replace(/^\s+/,"").length; }

function stripUniformPrefix(lines){
  if (lines.some(l=>ACTOR_HEADER.test(l))) return {lines, prefix:0};
  let col=null;
  for (const l of lines){ const m=l.match(ACTOR_PROBE); if(m){ col=m.index; break; } }
  if (!col) return {lines, prefix:0};
  const stripped = lines.map(l=>l.slice(col));
  if (stripped.some(l=>ACTOR_HEADER.test(l))) return {lines:stripped, prefix:col};
  return {lines, prefix:0};
}
function splitSections(lines){
  for (let i=0;i<lines.length;i++){ if (JVM_THREAD.test(lines[i])) return {tree:lines.slice(0,i), jvm:lines.slice(i)}; }
  return {tree:lines, jvm:[]};
}

function parseActors(treeLines){
  const actors=[]; let cur=null;
  for (const line of treeLines){
    if (!line.trim() || line.startsWith("[Actor ")) continue;
    const h = line.match(ACTOR_HEADER);
    if (h){
      const d = line.match(DURATION_RE);
      cur = {id:+h[1], name:h[2], uptime:d?parseDuration(d[1],d[2]):0, nodes:[]};
      actors.push(cur); continue;
    }
    if (!cur) continue;                       // preamble / heading rows before first actor
    const d = line.match(DURATION_RE);
    cur.nodes.push({depth:leadingWs(line), label:line.trim(), seconds:d?parseDuration(d[1],d[2]):null});
  }
  return actors;
}

function computeDerived(a){
  const n = a.nodes;
  // epoch wait: shallowest "Epoch ..." span (indent-unit agnostic)
  let ew = 0;
  if (n.length){
    let minDepth = Infinity; for (const x of n) if (x.depth<minDepth) minDepth=x.depth;
    const top = n.filter(x=>x.depth===minDepth && x.seconds!=null);
    const epochs = top.filter(x=>x.label.startsWith("Epoch")).map(x=>x.seconds);
    ew = epochs.length ? arrMax(epochs) : arrMax(top.map(x=>x.seconds));
  }
  a.epochWait = ew;
  // leaves
  const leaves=[];
  for (let i=0;i<n.length;i++){
    const isLeaf = !(i+1<n.length && n[i+1].depth>n[i].depth);
    if (isLeaf) leaves.push(n[i]);
  }
  // primary await (drop sub-waits longer than the step = parse noise).
  // Tie-break by label lexicographically to match Python's max((seconds,label)).
  let bestSec=-Infinity, bestLbl=null;
  for (const nd of leaves){
    if (nd.seconds==null) continue;
    if (ew>0 && nd.seconds>ew+1e-6) continue;
    const lbl=normaliseLabel(nd.label);
    if (nd.seconds>bestSec || (nd.seconds===bestSec && (bestLbl===null || lbl>bestLbl))){ bestSec=nd.seconds; bestLbl=lbl; }
  }
  a.primary = bestLbl!==null ? [bestLbl, bestSec] : null;
  a.category = a.primary ? normaliseCategory(a.primary[0]) : "?";
  // upstream edges
  const up=[];
  for (const nd of leaves){ if(nd.seconds==null) continue; const m=nd.label.match(INPUT_EDGE); if(m) up.push({id:+m[1], sec:nd.seconds}); }
  a.upstreams = up;
  delete a.nodes;   // free memory on big dumps
}

function parseJvm(jvmLines){
  const threads=[]; let cur=null;
  for (const line of jvmLines){
    const h=line.match(JVM_THREAD);
    if (h){ cur={name:h[1], state:h[3], frames:[]}; threads.push(cur); }
    else if (cur){ const s=line.trim(); if(s.startsWith("at ")) cur.frames.push(s.slice(3)); }
  }
  return threads;
}
function collapseThreadName(n){ return n.replace(/-thread-\d+/,"-thread-*").replace(/-\d+$/,"-*"); }
function repFrame(t){
  for (const f of t.frames){ if (f.includes("risingwave")||f.includes("connector")||f.startsWith("app//")) return f; }
  return t.frames.length ? t.frames[0] : "(no frames)";
}

// ---- Counter helpers ----
function counter(iter){ const m=new Map(); for(const k of iter) m.set(k,(m.get(k)||0)+1); return m; }
function mostCommon(map,n){ const a=[...map.entries()].sort((x,y)=>y[1]-x[1]); return n?a.slice(0,n):a; }
function median(sortedAsc){ const k=sortedAsc.length; if(!k) return 0; const mid=k>>1; return k%2?sortedAsc[mid]:(sortedAsc[mid-1]+sortedAsc[mid])/2; }

// ---- chain walking ----
function walkToRoot(startId, byId, maxHops){
  const path=[startId]; const seen=new Set([startId]); let cur=startId;
  for (let h=0;h<maxHops;h++){
    const a=byId.get(cur); if(!a) break;
    let nxt=null, best=-Infinity;
    for (const e of a.upstreams){ if(!byId.has(e.id)||seen.has(e.id)) continue; const w=byId.get(e.id).epochWait; if(w>best){best=w;nxt=e.id;} }
    if (nxt==null) break;
    path.push(nxt); seen.add(nxt); cur=nxt;
  }
  return path;
}

// ===================================================================== //
// Analysis                                                              //
// ===================================================================== //
function analyse(actors, jvm, stuckThreshold, top, maxHops){
  const data={total_actors:actors.length, stuck_threshold:stuckThreshold};
  if (actors.length){
    const waits = actors.map(a=>a.epochWait).sort((x,y)=>x-y);
    const q=p=>waits[Math.min(Math.floor(waits.length*p), waits.length-1)];
    data.wait_stats={median:median(waits), p95:q(0.95), p99:q(0.99), max:waits[waits.length-1]};

    const dist=new Map();
    for (const w of waits){
      for (let i=0;i<BUCKET_EDGES.length-1;i++){ const lo=BUCKET_EDGES[i],hi=BUCKET_EDGES[i+1];
        if (w>=lo && w<hi){ dist.set(i,(dist.get(i)||0)+1); break; } }
    }
    data.distribution=[];
    for (let i=0;i<BUCKET_EDGES.length-1;i++){ const lo=BUCKET_EDGES[i],hi=BUCKET_EDGES[i+1];
      const label = hi===Infinity ? (">"+lo+" s") : (lo+"–"+hi+" s");
      data.distribution.push([label, dist.get(i)||0]); }
    data.stuck_count = actors.reduce((c,a)=>c+(a.epochWait>=stuckThreshold?1:0),0);

    const byPipe=new Map();
    for (const a of actors){ if(!byPipe.has(a.name)) byPipe.set(a.name,[]); byPipe.get(a.name).push(a); }
    const pipes=[];
    for (const [name,g] of byPipe){ const ws=g.map(x=>x.epochWait).sort((x,y)=>x-y);
      pipes.push([arrMax(ws), median(ws), g.length, name]); }
    pipes.sort((a,b)=> b[0]-a[0] || b[2]-a[2]);
    data.pipelines = pipes.slice(0,top);

    data.await_points = mostCommon(counter(actors.filter(a=>a.primary).map(a=>a.primary[0])), top);
    data.top_actors = actors.slice().sort((a,b)=>b.epochWait-a.epochWait).slice(0,top)
      .map(a=>[a.epochWait, a.id, a.name, a.primary?a.primary[0]:"?"]);

    const byId=new Map(actors.map(a=>[a.id,a]));
    const roots=new Map();
    for (const a of actors){ const r=byId.get(walkToRoot(a.id,byId,maxHops).at(-1)).category; roots.set(r,(roots.get(r)||0)+1); }
    data.root_split = mostCommon(roots,0);

    data.chains=[];
    for (const [,,,name] of data.pipelines){
      const g=byPipe.get(name); let seed=g[0]; for(const x of g) if(x.epochWait>seed.epochWait) seed=x;
      const path=walkToRoot(seed.id,byId,maxHops); const hops=[]; let last=null;
      for (const id of path){ const a=byId.get(id); if(a.name===last) continue; last=a.name; hops.push([a.name,a.epochWait,a.category]); }
      data.chains.push({pipeline:name, max_wait:seed.epochWait, actor_count:g.length, hops});
    }
  }
  if (jvm.length){
    data.jvm={
      total:jvm.length,
      states:mostCommon(counter(jvm.map(t=>t.state)),0),
      groups:mostCommon(counter(jvm.map(t=>collapseThreadName(t.name))),top),
      runnable:mostCommon(counter(jvm.filter(t=>t.state==="RUNNABLE").map(repFrame)),top),
      blocked:jvm.filter(t=>t.state==="BLOCKED").length,
    };
  }
  return data;
}

function toJson(data, source){
  const r=x=>Math.round(x*1000)/1000;
  const o={source, generated_utc:new Date().toISOString(), total_actors:data.total_actors};
  if (!data.total_actors) return o;
  o.stuck_threshold=data.stuck_threshold; o.stuck_count=data.stuck_count;
  o.wait_stats={}; for(const k in data.wait_stats) o.wait_stats[k]=r(data.wait_stats[k]);
  o.distribution=data.distribution.map(([b,c])=>({bucket:b,actors:c}));
  o.root_split=data.root_split.map(([k,v])=>({await:k,actors:v}));
  o.pipelines=data.pipelines.map(([mx,md,c,n])=>({pipeline:n,max:r(mx),median:r(md),actors:c}));
  o.await_points=data.await_points.map(([k,v])=>({await:k,actors:v}));
  o.top_actors=data.top_actors.map(([w,id,n,aw])=>({wait:r(w),actor:id,pipeline:n,await:aw}));
  o.chains=data.chains.map(c=>({pipeline:c.pipeline,max_wait:r(c.max_wait),actor_count:c.actor_count,
    hops:c.hops.map(([n,w,cat])=>({pipeline:n,wait:r(w),await:cat}))}));
  if (data.jvm) o.jvm={total:data.jvm.total, states:data.jvm.states.map(([s,c])=>({state:s,count:c})),
    groups:data.jvm.groups.map(([g,c])=>({group:g,count:c})),
    runnable:data.jvm.runnable.map(([f,c])=>({frame:f,count:c})), blocked_count:data.jvm.blocked};
  return o;
}

// ===================================================================== //
// Rendering                                                             //
// ===================================================================== //
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function badge(cat){ return `<span class="badge b-${CAT_COLOUR[cat]||"gray"}">${esc(cat)}</span>`; }
function nf(n){ return n.toLocaleString("en-US"); }
function barRow(label,count,total){ const pct=total?count/total*100:0;
  return `<tr><td>${esc(label)}</td><td class=num>${nf(count)}</td>`
       + `<td style="width:55%"><div class=barcell><span style="width:${pct.toFixed(1)}%"></span>`
       + `<em>${pct.toFixed(1)}%</em></div></td></tr>`; }

function renderReport(data){
  const total=data.total_actors;
  if (!total) return "<p>No actors parsed. If this is a dump with a non-standard format, check the console.</p>";
  const s=data.wait_stats; const out=[];
  const cards=[["Actors",nf(total)],["Epoch-wait median",s.median.toFixed(2)+"s"],
    ["p99",s.p99.toFixed(2)+"s"],["max",s.max.toFixed(2)+"s"],["Stuck actors",nf(data.stuck_count)]];
  out.push('<div class=cards>'+cards.map(([k,v])=>`<div class=card><div class=k>${k}</div><div class=v>${v}</div></div>`).join("")+'</div>');

  out.push("<h2>Backpressure roots — where every chain bottoms out</h2>");
  out.push('<p class=sub>Each actor’s wait traced upstream (most-stuck branch) to its terminal await.</p>');
  out.push("<table><thead><tr><th>Terminal await</th><th class=num>Actors</th><th>Share</th></tr></thead><tbody>"
    + data.root_split.map(([l,c])=>barRow(l,c,total)).join("")+"</tbody></table>");

  out.push("<h2>Worst chain per pipeline (downstream → upstream root)</h2>");
  for (const ch of data.chains){
    out.push('<div class=chain><div class=title><span class=mono>'+esc(ch.pipeline)+'</span>'
      +`<span class=meta>max ${ch.max_wait.toFixed(2)}s · ${nf(ch.actor_count)} actors</span></div>`);
    ch.hops.forEach(([nm,wait,cat],depth)=>{
      const arm=("&nbsp;&nbsp;".repeat(depth))+(depth?"↳ ":"");
      out.push(`<div class=hop><span class=arm>${arm}</span><span class=pn>${esc(nm)}</span> ${badge(cat)}<span class=w>${wait.toFixed(2)}s</span></div>`);
    });
    out.push("</div>");
  }

  out.push("<h2>Epoch-wait distribution</h2>");
  out.push("<table><thead><tr><th>Bucket</th><th class=num>Actors</th><th>Share</th></tr></thead><tbody>"
    + data.distribution.map(([l,c])=>barRow(l,c,total)).join("")+"</tbody></table>");

  out.push("<h2>Pipelines by max epoch-wait</h2>");
  out.push("<table><thead><tr><th>Pipeline</th><th class=num>max</th><th class=num>median</th><th class=num>actors</th></tr></thead><tbody>"
    + data.pipelines.map(([mx,md,c,n])=>`<tr><td class=mono>${esc(n)}</td><td class=num>${mx.toFixed(2)}s</td><td class=num>${md.toFixed(2)}s</td><td class=num>${nf(c)}</td></tr>`).join("")
    + "</tbody></table>");

  out.push("<h2>Primary await-point (all actors)</h2>");
  out.push("<table><thead><tr><th>Await point</th><th class=num>Actors</th><th>Share</th></tr></thead><tbody>"
    + data.await_points.map(([l,c])=>barRow(l,c,total)).join("")+"</tbody></table>");

  out.push("<h2>Slowest individual actors</h2>");
  out.push("<table><thead><tr><th class=num>wait</th><th class=num>actor</th><th>pipeline</th><th>await</th></tr></thead><tbody>"
    + data.top_actors.map(([w,id,n,aw])=>`<tr><td class=num>${w.toFixed(2)}s</td><td class=num>${id}</td><td class=mono>${esc(n)}</td><td>${badge(normaliseCategory(aw))}</td></tr>`).join("")
    + "</tbody></table>");

  if (data.jvm){
    const j=data.jvm;
    out.push("<h2>JVM connector-node thread dump</h2>");
    out.push(`<p class=sub>${nf(j.total)} threads · `+j.states.map(([st,c])=>`<span class=pill>${esc(st)} ${c}</span>`).join("")+"</p>");
    out.push("<table><thead><tr><th>Thread group</th><th class=num>Count</th></tr></thead><tbody>"
      + j.groups.map(([g,c])=>`<tr><td class=mono>${esc(g)}</td><td class=num>${c}</td></tr>`).join("")+"</tbody></table>");
    if (j.runnable.length){
      out.push("<h2>RUNNABLE threads — representative frame</h2>");
      out.push("<table><thead><tr><th>Frame</th><th class=num>Count</th></tr></thead><tbody>"
        + j.runnable.map(([f,c])=>`<tr><td class=mono>${esc(f)}</td><td class=num>${c}</td></tr>`).join("")+"</tbody></table>");
    }
    out.push(`<p class=note>Lock-contended (BLOCKED) threads: ${j.blocked}</p>`);
  }
  out.push('<p class=note>Chain roots follow the most-stuck upstream branch at each hop — robust for the aggregate split, heuristic for any single path when the dump is off-peak.</p>');
  return out.join("");
}

// ===================================================================== //
// App wiring: load (drop / paste / click) -> parse -> render            //
// ===================================================================== //
const $ = id => document.getElementById(id);
const loaderEl=$("loader"), reportEl=$("report"), dropEl=$("drop"), fileEl=$("file"), errEl=$("err");
let STATE=null;   // {actors, jvm, source, prefix}

function setError(msg){ errEl.textContent = msg||""; }

function process(text, source){
  try{
    setError("");
    let lines = text.split(/\r?\n/);
    const sp = stripUniformPrefix(lines); lines = sp.lines;
    const {tree, jvm} = splitSections(lines);
    const actors = parseActors(tree);
    for (const a of actors) computeDerived(a);
    const jvmThreads = parseJvm(jvm);
    if (!actors.length){ setError("0 actors parsed — is this an await-tree dump?"); return; }
    STATE = {actors, jvm:jvmThreads, source, prefix:sp.prefix};
    loaderEl.style.display="none"; reportEl.style.display="block";
    render();
  }catch(e){ console.error(e); setError("Parse error: "+e.message); }
}

function render(){
  if (!STATE) return;
  const top = Math.max(1, +$("topN").value||15);
  const stuck = Math.max(0, +$("stuck").value||0);
  const data = analyse(STATE.actors, STATE.jvm, stuck, top, 15);
  $("fn").textContent = STATE.source;
  $("summary").textContent = `${nf(STATE.actors.length)} actors · ${nf(STATE.jvm.length)} JVM threads`
    + (STATE.prefix ? ` · stripped ${STATE.prefix}-char line prefix` : "");
  let banner = STATE.prefix ? `<div class=banner>Detected and stripped a ${STATE.prefix}-character per-line prefix (e.g. log timestamps) before parsing.</div>` : "";
  $("body").innerHTML = banner + renderReport(data);
  STATE._data = data;
}

function readFile(file){
  const r=new FileReader();
  r.onload = ()=>process(r.result, file.name);
  r.onerror = ()=>setError("Could not read file.");
  r.readAsText(file);
}
function loadWith(fn){ setError(""); dropEl.querySelector(".big").textContent="Parsing…"; setTimeout(fn, 10); }

// click / keyboard
dropEl.addEventListener("click", ()=>fileEl.click());
dropEl.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" ") fileEl.click(); });
fileEl.addEventListener("change", ()=>{ if(fileEl.files[0]){ const f=fileEl.files[0]; loadWith(()=>readFile(f)); } });

// drag & drop (whole window)
["dragenter","dragover"].forEach(ev=>window.addEventListener(ev,e=>{ e.preventDefault(); dropEl.classList.add("hot"); }));
["dragleave","dragend"].forEach(ev=>window.addEventListener(ev,e=>{ if(e.relatedTarget===null) dropEl.classList.remove("hot"); }));
window.addEventListener("drop", e=>{
  e.preventDefault(); dropEl.classList.remove("hot");
  const dt=e.dataTransfer; if(!dt) return;
  if (dt.files && dt.files.length){ const f=dt.files[0]; loadWith(()=>readFile(f)); return; }
  const t = dt.getData("text"); if (t && t.trim()) loadWith(()=>process(t,"dropped text"));
});

// paste anywhere (file or raw text)
window.addEventListener("paste", e=>{
  const cd=e.clipboardData; if(!cd) return;
  if (cd.files && cd.files.length){ e.preventDefault(); const f=cd.files[0]; loadWith(()=>readFile(f)); return; }
  const t = cd.getData("text/plain"); if (t && t.trim()){ e.preventDefault(); loadWith(()=>process(t,"pasted")); }
});

// report controls
$("topN").addEventListener("change", render);
$("stuck").addEventListener("change", render);
$("another").addEventListener("click", ()=>{
  reportEl.style.display="none"; loaderEl.style.display="flex";
  dropEl.querySelector(".big").textContent="Drop a RisingWave await-tree dump here";
  STATE=null; fileEl.value="";
});
$("dljson").addEventListener("click", ()=>{
  if (!STATE) return;
  const blob=new Blob([JSON.stringify(toJson(STATE._data, STATE.source),null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(STATE.source.replace(/\.[^.]*$/,"")||"await-tree")+".json"; a.click(); URL.revokeObjectURL(a.href);
});
</script>
</body>
